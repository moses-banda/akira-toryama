<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body {
      width: 200px;
      padding: 30px 10px;
      background: #0f172a;
      backdrop-filter: blur(10px);
      text-align: center;
      font-family: system-ui, sans-serif;
      margin: 0;
    }
    .eva-orb-container {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 20px auto;
      cursor: pointer;
      transition: 0.3s;
    }
    .eva-orb-container:hover {
      transform: scale(1.05);
    }
    .eva-orb {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 30%, #6366f1, #a855f7);
      border-radius: 50%;
      filter: blur(2px);
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
      transition: all 0.4s;
    }
    .eva-sleeping .eva-orb {
      background: radial-gradient(circle at 30% 30%, #475569, #1e293b);
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.4);
      filter: grayscale(100%);
    }
    .eva-orb-glow {
      position: absolute;
      width: 140%;
      height: 140%;
      left: -20%;
      top: -20%;
      background: #6366f1;
      border-radius: 50%;
      filter: blur(10px);
      opacity: 0.1;
      animation: eva-breathe 4s infinite alternate ease-in-out;
    }
    .eva-sleeping .eva-orb-glow { display: none; }
    
    @keyframes eva-breathe {
      from { transform: scale(0.9); opacity: 0.05; }
      to { transform: scale(1.1); opacity: 0.2; }
    }
    .user-talking .eva-orb {
      animation: user-breathe 0.6s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.7);
    }
    @keyframes user-breathe {
      from { transform: scale(0.95); filter: brightness(1.2); }
      to { transform: scale(1.15); filter: brightness(1.5); }
    }
    
    #eva-session-timer {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: #38bdf8;
      background: rgba(15, 23, 42, 0.9);
      padding: 3px 8px;
      border-radius: 12px;
      border: 1px solid rgba(56, 189, 248, 0.3);
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    #orbRoot:not(.eva-sleeping) #eva-session-timer { opacity: 1; }

    #eva-freq-bars {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 3px;
      align-items: flex-end;
      height: 20px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #orbRoot:not(.eva-sleeping) #eva-freq-bars { opacity: 1; }

    .eva-bar {
      width: 3px;
      border-radius: 2px;
      background: linear-gradient(to top, #38bdf8, #818cf8);
      min-height: 3px;
      transition: height 0.08s ease;
    }

    .status-text {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 20px;
      font-weight: 500;
      margin-top: 25px;
    }
    button {
      background: #10b981;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      width: 90%;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="orbRoot" class="eva-orb-container eva-sleeping" title="Tap the Orb to Wake Eva">
    <div id="eva-session-timer">00:00:00</div>
    <div class="eva-orb-glow"></div>
    <div class="eva-orb"></div>
    <div id="eva-freq-bars">
      <div class="eva-bar"></div><div class="eva-bar"></div><div class="eva-bar"></div><div class="eva-bar"></div>
      <div class="eva-bar"></div><div class="eva-bar"></div><div class="eva-bar"></div><div class="eva-bar"></div>
      <div class="eva-bar"></div><div class="eva-bar"></div><div class="eva-bar"></div><div class="eva-bar"></div>
    </div>
  </div>
  <div id="status" class="status-text">Eva is Asleep</div>
  <button id="grantBtn">Grant Microphone</button>
  <script src="popup.js"></script>
</body>
</html>
