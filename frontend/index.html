<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eva — Siri Mode</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --orb-size: 260px;
      --primary: #6366f1;
      --secondary: #a855f7;
    }
    body {
      margin: 0;
      background: #020617;
      color: white;
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
    }
    .orb-wrapper {
      position: relative;
      width: var(--orb-size);
      height: var(--orb-size);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .orb {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 30%, var(--primary), var(--secondary));
      border-radius: 50%;
      filter: blur(4px);
      box-shadow: 0 0 100px rgba(99, 102, 241, 0.4);
      z-index: 2;
      transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .orb-glow {
      position: absolute;
      width: 130%;
      height: 130%;
      background: var(--primary);
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.15;
      animation: breathe 5s infinite alternate ease-in-out;
    }
    @keyframes breathe {
      from { transform: scale(0.95); opacity: 0.1; }
      to { transform: scale(1.1); opacity: 0.25; }
    }
    .orb.talking {
      animation: ripple 0.8s infinite alternate ease-in-out;
      box-shadow: 0 0 150px rgba(168, 85, 247, 0.6);
    }
    @keyframes ripple {
      from { transform: scale(1); filter: contrast(1); }
      to { transform: scale(1.1); filter: contrast(1.5) hue-rotate(30deg); }
    }
    .status {
      margin-top: 60px;
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }
    #session-timer {
      position: absolute;
      top: -30px;
      font-family: monospace;
      font-size: 14px;
      letter-spacing: 2px;
      color: #38bdf8;
      background: rgba(15, 23, 42, 0.9);
      padding: 4px 12px;
      border-radius: 12px;
      border: 1px solid rgba(56, 189, 248, 0.3);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
    }
    #session-timer.active {
      opacity: 1;
    }
    #transcript {
      position: fixed;
      bottom: 80px;
      max-width: 80% ;
      text-align: center;
      font-size: 22px;
      font-weight: 300;
      line-height: 1.4;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      padding: 0 40px;
      pointer-events: none;
      transition: 0.3s;
    }
    .btn-wake {
      margin-top: 40px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 14px 40px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 400;
      cursor: pointer;
      backdrop-filter: blur(20px);
      transition: 0.3s;
      z-index: 10;
    }
    .btn-wake:hover {
      background: rgba(255,255,255,0.1);
      transform: scale(1.05);
      border-color: var(--primary);
    }

    /* ─── Realtime Analysis Panel ─── */
    #analysis-panel {
      position: fixed;
      top: 30px;
      right: 30px;
      width: 320px;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 16px;
      border: 1px solid rgba(99, 102, 241, 0.3);
      padding: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      opacity: 0;
      transform: translateX(40px);
      transition: all 0.4s ease;
      pointer-events: none;
    }
    #analysis-panel.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .analysis-header {
      font-size: 14px;
      font-weight: 600;
      color: #c4b5fd;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
    }
    .fluency-score {
      background: rgba(52, 211, 153, 0.2);
      color: #34d399;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .grammar-item {
      margin-bottom: 12px;
      font-size: 14px;
      line-height: 1.5;
    }
    .grammar-wrong {
      color: #f87171;
      text-decoration: line-through;
    }
    .grammar-correct {
      color: #34d399;
      font-weight: 600;
      display: inline-block;
      margin-left: 8px;
    }
    .bucket-stats {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 15px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="orb-wrapper" id="orbWrapper">
    <div id="session-timer">00:00:00</div>
    <div class="orb-glow"></div>
    <div class="orb" id="evaOrb"></div>
  </div>
  
  <div class="status" id="statusText">Standing By</div>
  
  <div id="transcript"></div>
  
  <button class="btn-wake" id="wakeBtn">Wake Eva</button>

  <div id="analysis-panel">
    <div class="analysis-header">
      <span>Groq Analysis</span>
      <span class="fluency-score" id="fluencyScore">Flawless</span>
    </div>
    <div id="grammarContent">
       <!-- Real-time issues go here -->
    </div>
    <div class="bucket-stats" id="bucketStats">
      <span>💬 0 utterances</span>
      <span>⭐ 0 key</span>
      <span>⚠️ 0 fixes</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  <script src="/static/app.js?v=2"></script>
</body>
</html>
